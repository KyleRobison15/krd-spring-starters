# JWT Configuration
# Override these values in your application.properties

# JWT Secret Key (IMPORTANT: Change this in production!)
jwt.secret=your-256-bit-secret-key-change-this-in-production-please-make-it-long-enough

# JWT Token Expiration Times
# Access token: 15 minutes (in milliseconds)
jwt.access-token-expiration=900000

# Refresh token: 7 days (in milliseconds)
jwt.refresh-token-expiration=604800000
